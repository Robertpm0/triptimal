<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Travel Cost Optimizer</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-slate-950 via-slate-900 to-slate-950 text-white min-h-screen">

<div class="max-w-5xl mx-auto px-6 py-16">

    <!-- Hero -->
    <div class="text-center mb-14">
        <h1 class="text-4xl md:text-5xl font-bold tracking-tight mb-4">
            Optimize Your Travel Costs ✈️
        </h1>
        <p class="text-slate-400 text-lg">
            Multi-city trip planning made intelligent.
        </p>
    </div>

    <!-- Main Widget -->
    <div class="bg-slate-900/60 backdrop-blur-xl border border-slate-800 rounded-2xl shadow-2xl p-8 mb-20">

        <h2 class="text-2xl font-semibold mb-8 text-sky-400">
            Get Started
        </h2>

        <form method="POST" action="/submit">

            <!-- Date Range -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-8">
                <div>
                    <label class="text-sm text-slate-400 block mb-2">Start Date</label>
                    <input type="date" name="start_date"
                        class="bg-slate-800 border border-slate-700 rounded-lg p-3 w-full focus:outline-none focus:ring-2 focus:ring-sky-500 transition">
                </div>

                <div>
                    <label class="text-sm text-slate-400 block mb-2">End Date</label>
                    <input type="date" name="end_date"
                        class="bg-slate-800 border border-slate-700 rounded-lg p-3 w-full focus:outline-none focus:ring-2 focus:ring-sky-500 transition">
                </div>
            </div>

            <!-- Cities -->
            <div class="mb-6">
                <label class="text-sm text-slate-400 block mb-4">
                    Cities You Want to Visit
                </label>

                <div id="city-container"
                     class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
                </div>

                <button type="button"
                        onclick="addCity()"
                        class="mt-4 text-sky-400 hover:text-sky-300 transition">
                    + Add another city
                </button>
            </div>

            <!-- Nights -->
            <div class="mb-10">
                <label class="text-sm text-slate-400 block mb-2">
                    Number of Nights
                </label>
                <input type="number" name="nights" min="1" required
                       class="bg-slate-800 border border-slate-700 w-full rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-sky-500 transition">
            </div>

            <button type="submit"
                    class="w-full bg-sky-500 hover:bg-sky-400 text-black font-semibold py-3 rounded-xl transition duration-200 shadow-lg hover:shadow-sky-500/20">
                Optimize My Trip
            </button>

        </form>
    </div>
</div>

<script>
let cityIndex = 0;

function addCity() {
    const container = document.getElementById("city-container");

    const wrapper = document.createElement("div");
    wrapper.classList.add("relative");

    wrapper.innerHTML = `
        <input
            type="text"
            placeholder="Enter city"
            autocomplete="off"
            class="city-input bg-slate-800 border border-slate-700 w-full rounded-lg p-3 
                   focus:outline-none focus:ring-2 focus:ring-sky-500 transition"
        />

        <!-- Hidden fields -->
        <input type="hidden" name="cities" class="city-name">
        <input type="hidden" name="city_ids" class="city-id">

        <div class="dropdown hidden absolute z-50 w-full mt-1 
                    bg-slate-800 border border-slate-700 
                    rounded-lg shadow-xl max-h-48 overflow-y-auto">
        </div>
    `;

    container.appendChild(wrapper);

    const input = wrapper.querySelector(".city-input");
    const dropdown = wrapper.querySelector(".dropdown");
    const hiddenName = wrapper.querySelector(".city-name");
    const hiddenId = wrapper.querySelector(".city-id");

    input.addEventListener("input", function () {
        const query = input.value;

        hiddenName.value = "";
        hiddenId.value = "";

        if (!query) {
            dropdown.classList.add("hidden");
            return;
        }

        fetch(`/search?q=${query}&n=5`)
            .then(res => res.json())
            .then(data => {
                dropdown.innerHTML = "";

                if (data.length === 0) {
                    dropdown.classList.add("hidden");
                    return;
                }

                data.forEach(city => {
                    const option = document.createElement("div");
                    option.textContent = city.name;
                    option.className = `
                        px-3 py-2 cursor-pointer 
                        hover:bg-sky-500 hover:text-black 
                        transition rounded-md
                    `;

                    option.addEventListener("click", () => {
                        input.value = city.name;
                        hiddenName.value = city.name;
                        hiddenId.value = city.id;
                        dropdown.classList.add("hidden");
                    });

                    dropdown.appendChild(option);
                });

                dropdown.classList.remove("hidden");
            });
    });

    document.addEventListener("click", function(e) {
        if (!wrapper.contains(e.target)) {
            dropdown.classList.add("hidden");
        }
    });

    cityIndex++;
}

// Initialize 4 inputs
for (let i = 0; i < 4; i++) {
    addCity();
}
</script>

</body>
</html>
